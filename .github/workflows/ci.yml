name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Lint shell scripts
        run: |
          # Gate on warning+; info/style findings are advisory (a stray info-level
          # false positive shouldn't break the build).
          shellcheck --severity=warning \
            install.sh \
            uninstall.sh \
            cli/cta \
            agent/start_agents.sh \
            agent/watch_network.sh \
            scripts/check-no-secrets.sh

  bash-syntax:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: bash -n on every shell script
        run: |
          for f in install.sh uninstall.sh cli/cta agent/*.sh scripts/*.sh tests/*.sh; do
            echo "→ $f"
            bash -n "$f"
          done

  tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Run shell tests
        run: tests/run.sh

  e2e:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Ensure tmux
        # macOS runners ship tmux, but guard so a runner-image change can't
        # silently turn the suite off again. jq + curl are preinstalled.
        run: command -v tmux >/dev/null || brew install tmux
      - name: Run E2E suite
        # Self-contained: each scenario sandboxes its own poller against a mock
        # Bot API + a fake-claude stub, so no real claude / network is needed.
        run: bash tests/e2e/run.sh
