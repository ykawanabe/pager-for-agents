name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck \
            install.sh \
            uninstall.sh \
            cli/cta \
            agent/restart_claude.sh \
            agent/start_agents.sh \
            agent/topic-wrapper.sh \
            agent/watch_network.sh \
            scripts/check-no-secrets.sh

  bash-syntax:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: bash -n on every shell script
        run: |
          for f in install.sh uninstall.sh cli/cta agent/*.sh scripts/*.sh tests/*.sh; do
            echo "→ $f"
            bash -n "$f"
          done

  tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Run shell tests
        run: tests/run.sh
